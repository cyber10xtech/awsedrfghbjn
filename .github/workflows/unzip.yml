name: Unzip All Files and Commit

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run it manually

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the GITHUB_TOKEN permission to push commits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Unzip all zip files
        run: |
          find . -type f -name "*.zip" -exec unzip -o {} -d . \;
          find . -type f -name "*.zip" -delete # Optional: Deletes the original zip files

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-unzip all zip files"
          git push origin main
