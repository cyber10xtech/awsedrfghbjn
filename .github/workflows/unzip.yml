name: Unzip Files and Commit

on:
  push:
    branches:
      - main
    paths:
      - '**/*.zip' # Triggers only when a ZIP file is added or updated

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip all ZIP files
        run: |
          # Find all .zip files recursively, excluding node_modules or .git
          find . -name "*.zip" -not -path "*/.*" | while read -r zipfile; do
            # Extract to a folder with the same name as the ZIP (minus .zip extension)
            target_dir="${zipfile%.zip}"
            echo "Extracting $zipfile into $target_dir"
            mkdir -p "$target_dir"
            unzip -o "$zipfile" -d "$target_dir"
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          git add .
          
          # Only commit if there are actually new unzipped files to add
          if ! git diff --staged --quiet; then
            git commit -m "Automated unzip of repository ZIP files [skip ci]"
            git push origin main
          else
            echo "No new files to commit."
          fi
