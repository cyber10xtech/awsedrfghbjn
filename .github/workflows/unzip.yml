name: Auto Unzip Uploads

on:
  push:
    paths:
      - '**/*.zip'

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Every Zip File
        run: |
          # Loop through all zip files in the workspace
          find . -name "*.zip" -type f | while read -r zipfile; do
            # Get the directory and base name of the zip file
            dir=$(dirname "$zipfile")
            base=$(basename "$zipfile" .zip)
            
            echo "Processing $zipfile..."
            
            # Unzip into a folder named after the archive file
            unzip -o "$zipfile" -d "$dir/$base"
            
            # Remove the original zip file to avoid duplicate commits
            rm "$zipfile"
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # Check if there are any changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: auto-unzip uploaded archive files"
            git push
          fi
